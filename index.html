```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Elegant Wrapped Bouquet</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:flex-end;
background:linear-gradient(#fff,#ffeaf4);
overflow:hidden;
}

/* CONTENEDOR */

#bouquet{
position:relative;
width:420px;
height:650px;
animation:rise 3s ease forwards;
transform:translateY(700px);
}

@keyframes rise{
to{transform:translateY(0);}
}

/* TALLOS */

.stem{
position:absolute;
width:6px;
background:#2e8b57;
bottom:140px;
border-radius:4px;
transform-origin:bottom;
}

/* HOJAS */

.leaf{
position:absolute;
width:40px;
height:20px;
background:#3cb371;
border-radius:50%;
transform-origin:left;
}

/* FLORES */

.flower{
position:absolute;
transform-origin:bottom center;
animation:sway 5s ease-in-out infinite;
}

@keyframes sway{
0%{transform:rotate(-2deg)}
50%{transform:rotate(2deg)}
100%{transform:rotate(-2deg)}
}

/* ROSA */

.rose{
width:70px;
height:70px;
}

.rose .petal{
position:absolute;
width:32px;
height:42px;
background:#e63946;
border-radius:50%;
}

/* GIRASOL */

.sunflower{
width:70px;
height:70px;
}

.sunflower .petal{
position:absolute;
width:18px;
height:40px;
background:#f4a261;
border-radius:20px;
transform-origin:bottom center;
}

.sunflower .center{
position:absolute;
width:26px;
height:26px;
background:#6b3e26;
border-radius:50%;
top:20px;
left:22px;
}

/* CLAVEL */

.carnation .petal{
position:absolute;
width:30px;
height:30px;
background:#ff7aa2;
border-radius:50%;
}

/* POSICIÓN FLORES */

.f1{left:120px;bottom:380px;}
.f2{left:200px;bottom:410px;}
.f3{left:70px;bottom:360px;}
.f4{left:260px;bottom:350px;}
.f5{left:170px;bottom:450px;}

/* ENVOLTURA DEL RAMO */

.wrap{
position:absolute;
bottom:0;
left:60px;
width:300px;
height:260px;
background:linear-gradient(135deg,#f6d6c6,#fff);
clip-path:polygon(0 0,100% 0,75% 100%,25% 100%);
box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

/* LISTON */

.ribbon{
position:absolute;
bottom:120px;
left:160px;
width:120px;
height:60px;
}

.knot{
width:40px;
height:30px;
background:#ffd43b;
border-radius:6px;
position:absolute;
left:40px;
z-index:5;
}

.loopL,.loopR{
width:50px;
height:20px;
background:#ffd43b;
position:absolute;
top:5px;
border-radius:20px;
}

.loopL{
left:-5px;
transform:rotate(-25deg);
}

.loopR{
right:-5px;
transform:rotate(25deg);
}

.tailL,.tailR{
width:20px;
height:60px;
background:#ffd43b;
position:absolute;
top:25px;
}

.tailL{left:20px;transform:rotate(8deg);}
.tailR{right:20px;transform:rotate(-8deg);}

</style>
</head>

<body>

<div id="bouquet">

<!-- FLORES -->

<div class="flower rose f1">
<div class="petal" style="top:10px;left:20px"></div>
<div class="petal" style="top:0px;left:10px"></div>
<div class="petal" style="top:0px;left:30px"></div>
<div class="petal" style="top:15px;left:5px"></div>
<div class="petal" style="top:15px;left:35px"></div>
</div>

<div class="flower sunflower f2">
<div class="center"></div>
<div class="petal" style="top:0;left:25px;transform:rotate(0deg)"></div>
<div class="petal" style="top:5px;left:40px;transform:rotate(45deg)"></div>
<div class="petal" style="top:20px;left:45px;transform:rotate(90deg)"></div>
<div class="petal" style="top:35px;left:40px;transform:rotate(135deg)"></div>
<div class="petal" style="top:40px;left:25px;transform:rotate(180deg)"></div>
<div class="petal" style="top:35px;left:10px;transform:rotate(225deg)"></div>
<div class="petal" style="top:20px;left:5px;transform:rotate(270deg)"></div>
<div class="petal" style="top:5px;left:10px;transform:rotate(315deg)"></div>
</div>

<div class="flower carnation f3">
<div class="petal" style="top:5px;left:10px"></div>
<div class="petal" style="top:0px;left:20px"></div>
<div class="petal" style="top:10px;left:30px"></div>
<div class="petal" style="top:15px;left:5px"></div>
</div>

<div class="flower rose f4">
<div class="petal" style="top:10px;left:20px"></div>
<div class="petal" style="top:0px;left:10px"></div>
<div class="petal" style="top:0px;left:30px"></div>
<div class="petal" style="top:15px;left:5px"></div>
<div class="petal" style="top:15px;left:35px"></div>

<div class="center"></div>
<div class="petal" style="top:0;left:25px;transform:rotate(0deg)"></div>
<div class="petal" style="top:5px;left:40px;transform:rotate(45deg)"></div>
<div class="petal" style="top:20px;left:45px;transform:rotate(90deg)"></div>

<div class="petal" style="top:40px;left:25px;transform:rotate(180deg)"></div>
<div class="petal" style="top:35px;left:10px;transform:rotate(225deg)"></div>
<div class="petal" style="top:20px;left:5px;transform:rotate(270deg)"></div>
<div class="petal" style="top:5px;left:10px;transform:rotate(315deg)"></div>
</div>

<!-- TALLOS -->

<div class="stem" style="left:150px;height:300px;transform:rotate(-10deg)"></div>
<div class="stem" style="left:220px;height:320px;transform:rotate(5deg)"></div>

<!-- HOJAS -->

<div class="leaf" style="left:150px;bottom:260px;transform:rotate(-20deg)"></div>
<div class="leaf" style="left:210px;bottom:230px;transform:rotate(25deg)"></div>
<div class="leaf" style="left:120px;bottom:220px;transform:rotate(-40deg)"></div>

<!-- ENVOLTURA -->

<div class="wrap"></div>

<!-- LISTÓN -->

<div class="ribbon">
<div class="loopL"></div>
<div class="loopR"></div>
<div class="knot"></div>
<div class="tailL"></div>
<div class="tailR"></div>
</div>

</div>

</body>
</html>
