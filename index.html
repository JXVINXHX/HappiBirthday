<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ramo de Rosas</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300;1,400&display=swap');

  :root {
    --rose-deep: #8B1A2F;
    --rose-mid: #C0395A;
    --rose-light: #E8698A;
    --rose-petal: #F4A7B9;
    --rose-blush: #FDD5DE;
    --peony-pink: #E8A0B4;
    --lavender: #C9A8D4;
    --cream: #FFF5E6;
    --leaf-deep: #1A4A2E;
    --leaf-mid: #2D6A4F;
    --leaf-light: #52B788;
    --ribbon-gold: #D4AF37;
    --ribbon-dark: #A8891F;
    --stem-brown: #5C3A1E;
    --bg-start: #1a0a0f;
    --bg-end: #0d1a0f;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    background: radial-gradient(ellipse at 50% 100%, #2d1220 0%, #1a0a0f 40%, #0a0d0e 100%);
    display: flex;
    align-items: flex-end;
    justify-content: center;
    font-family: 'Cormorant Garamond', serif;
  }

  /* Ambient particles */
  .particles { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
  .particle {
    position: absolute;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,200,180,0.6), transparent);
    animation: float-particle linear infinite;
    opacity: 0;
  }

  @keyframes float-particle {
    0% { transform: translateY(100vh) scale(0); opacity: 0; }
    10% { opacity: 1; }
    90% { opacity: 0.4; }
    100% { transform: translateY(-10vh) scale(1); opacity: 0; }
  }

  /* Glow on floor */
  .floor-glow {
    position: fixed;
    bottom: -60px;
    left: 50%;
    transform: translateX(-50%);
    width: 500px;
    height: 160px;
    background: radial-gradient(ellipse, rgba(180,60,80,0.25) 0%, transparent 70%);
    border-radius: 50%;
    z-index: 0;
    animation: glow-pulse 4s ease-in-out infinite;
  }
  @keyframes glow-pulse {
    0%,100% { opacity: 0.6; transform: translateX(-50%) scaleX(1); }
    50% { opacity: 1; transform: translateX(-50%) scaleX(1.1); }
  }

  /* Main bouquet container */
  .bouquet-wrapper {
    position: relative;
    width: 420px;
    height: 600px;
    z-index: 10;
    animation: bouquet-rise 2.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    transform: translateY(100%);
    opacity: 0;
  }
  @keyframes bouquet-rise {
    0% { transform: translateY(100%); opacity: 0; }
    30% { opacity: 1; }
    100% { transform: translateY(0); opacity: 1; }
  }

  /* SVG container */
  .bouquet-svg {
    width: 100%;
    height: 100%;
    overflow: visible;
    filter: drop-shadow(0 30px 60px rgba(100,20,40,0.5));
  }

  /* Petal animations */
  @keyframes sway {
    0%,100% { transform-origin: bottom center; transform: rotate(-1.5deg); }
    50% { transform-origin: bottom center; transform: rotate(1.5deg); }
  }
  @keyframes sway-alt {
    0%,100% { transform-origin: bottom center; transform: rotate(1deg); }
    50% { transform-origin: bottom center; transform: rotate(-2deg); }
  }
  @keyframes breathe {
    0%,100% { transform: scale(1); }
    50% { transform: scale(1.015); }
  }
  @keyframes petal-bloom {
    0% { transform: scale(0.3) rotate(-20deg); opacity: 0; }
    60% { transform: scale(1.05) rotate(3deg); opacity: 1; }
    100% { transform: scale(1) rotate(0deg); opacity: 1; }
  }
  @keyframes ribbon-wave {
    0%,100% { transform: skewX(-1deg); }
    50% { transform: skewX(1deg); }
  }
  @keyframes leaf-unfurl {
    0% { transform: scaleY(0) rotate(10deg); opacity: 0; transform-origin: bottom center; }
    100% { transform: scaleY(1) rotate(0deg); opacity: 1; transform-origin: bottom center; }
  }

  .rose-group { animation: sway 5s ease-in-out infinite; }
  .rose-group:nth-child(odd) { animation: sway-alt 6s ease-in-out infinite; }
  .rose-group:nth-child(3n) { animation: sway 7s ease-in-out infinite; animation-delay: -2s; }

  .bloom-delay-1 { animation-delay: 0.3s; }
  .bloom-delay-2 { animation-delay: 0.6s; }
  .bloom-delay-3 { animation-delay: 0.9s; }
  .bloom-delay-4 { animation-delay: 1.2s; }
  .bloom-delay-5 { animation-delay: 1.5s; }

  /* Floating petals */
  @keyframes fall-petal {
    0% { transform: translate(0,0) rotate(0deg); opacity: 0.8; }
    100% { transform: translate(var(--dx), 120px) rotate(var(--rot)); opacity: 0; }
  }
  .falling-petal {
    position: fixed;
    pointer-events: none;
    z-index: 20;
    animation: fall-petal var(--dur) ease-in forwards;
    animation-delay: var(--delay);
    opacity: 0;
  }

  /* Label */
  .label {
    position: fixed;
    top: 40px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255,220,210,0.7);
    font-size: 1.1rem;
    font-style: italic;
    font-weight: 300;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    opacity: 0;
    animation: fade-in 1.5s ease forwards 2.5s;
  }
  @keyframes fade-in {
    to { opacity: 1; }
  }
</style>
</head>
<body>

<div class="particles" id="particles"></div>
<div class="floor-glow"></div>

<p class="label">Con todo el amor</p>

<div class="bouquet-wrapper">
<svg class="bouquet-svg" viewBox="0 0 420 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Rose gradients -->
    <radialGradient id="rg1" cx="45%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#F4A7B9"/>
      <stop offset="45%" stop-color="#C0395A"/>
      <stop offset="100%" stop-color="#7A1228"/>
    </radialGradient>
    <radialGradient id="rg2" cx="50%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#FFB8C8"/>
      <stop offset="40%" stop-color="#D4526E"/>
      <stop offset="100%" stop-color="#8B1A2F"/>
    </radialGradient>
    <radialGradient id="rg3" cx="40%" cy="38%" r="58%">
      <stop offset="0%" stop-color="#FDD5DE"/>
      <stop offset="50%" stop-color="#E8698A"/>
      <stop offset="100%" stop-color="#9E2345"/>
    </radialGradient>
    <radialGradient id="rg4" cx="48%" cy="42%" r="52%">
      <stop offset="0%" stop-color="#E8A0B4"/>
      <stop offset="45%" stop-color="#B54A6A"/>
      <stop offset="100%" stop-color="#7A1A32"/>
    </radialGradient>
    <!-- Peony -->
    <radialGradient id="pg1" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#FDE8F0"/>
      <stop offset="50%" stop-color="#E8A0B4"/>
      <stop offset="100%" stop-color="#C06080"/>
    </radialGradient>

      <stop offset="50%" stop-color="#C9A8D4"/>
      <stop offset="100%" stop-color="#8A6A9E"/>

    <!-- Leaf gradient -->
    <linearGradient id="leafG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#52B788"/>
      <stop offset="100%" stop-color="#1A4A2E"/>
    </linearGradient>
    <linearGradient id="leafG2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#40916C"/>
      <stop offset="100%" stop-color="#1B4332"/>
    </linearGradient>
    <!-- Ribbon gradient -->
    <linearGradient id="ribbonG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F0D060"/>
      <stop offset="30%" stop-color="#D4AF37"/>
      <stop offset="60%" stop-color="#F0D060"/>
      <stop offset="100%" stop-color="#A8891F"/>
    </linearGradient>
    <linearGradient id="ribbonGV" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F0D060"/>
      <stop offset="50%" stop-color="#C8A020"/>
      <stop offset="100%" stop-color="#E8C840"/>
    </linearGradient>
    <!-- Stem gradient -->
    <linearGradient id="stemG" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2D6A4F"/>
      <stop offset="50%" stop-color="#40916C"/>
      <stop offset="100%" stop-color="#1B4332"/>

    <!-- Wrap paper -->
    <linearGradient id="wrapG" x1="0%" y1="0%" x2="100%" y2="100%">

      <stop offset="100%" stop-color="#F5E8D8" stop-opacity="0.85"/>

    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">

      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    </filter>
    <filter id="petal-glow">

      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- ===== STEMS ===== -->

    <!-- Stem 3 (center-right) -->
    <path d="M225,600 C227,548 232,498 228,448 C224,398 220,355 218,300" stroke="url(#stemG)" stroke-width="5" fill="none" stroke-linecap="round"/>

    <!-- Stem 7 (far right) -->
    <path d="M245,600 C258,548 278,492 292,442 C306,390 315,345 325,285" stroke="url(#stemG)" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  </g>

  <!-- ===== LEAVES ===== -->
  <!-- Leaf pairs along stems -->
  <!-- Left leaves -->

    <path d="M165,440 C145,415 125,400 110,415 C125,430 145,440 165,440Z" fill="url(#leafG)" opacity="0.9"/>
    <path d="M165,440 C155,425 148,410 155,400" stroke="#1A4A2E" stroke-width="1" fill="none"/>

  <g style="animation: leaf-unfurl 1.2s ease forwards 2s; opacity:0">

  </g>
  <g style="animation: leaf-unfurl 1.2s ease forwards 2.2s; opacity:0">
    <path d="M220,400 C242,386 258,368 250,348 C234,362 224,382 220,400Z" fill="url(#leafG2)" opacity="0.88"/>
  </g>

  <!-- ===== WRAPPING PAPER ===== -->
  <!-- Kraft/tissue paper wrapping -->
  <g filter="url(#soft-shadow)" opacity="0.92">
    <!-- Main wrap cone -->
    <path d="M120,600 C125,560 140,530 155,510 C165,496 175,488 200,485 C225,482 248,490 265,505 C280,518 292,548 298,600Z" fill="url(#wrapG)"/>
    <!-- Wrap fold left -->
    <path d="M120,600 C125,560 140,530 155,510 C148,505 138,510 130,530 C122,550 118,580 120,600Z" fill="#F0E4CC" opacity="0.7"/>
    <!-- Wrap fold right -->
    <path d="M298,600 C292,548 280,518 265,505 C272,500 282,506 290,525 C298,545 300,575 298,600Z" fill="#F0E4CC" opacity="0.7"/>
    <!-- Wrap crease lines -->
    <path d="M155,510 C165,530 172,558 175,590" stroke="#D4C4A8" stroke-width="1" fill="none" opacity="0.6"/>
    <path d="M265,505 C255,528 248,558 245,590" stroke="#D4C4A8" stroke-width="1" fill="none" opacity="0.6"/>
    <path d="M210,485 C210,520 210,560 210,600" stroke="#D4C4A8" stroke-width="1" fill="none" opacity="0.4"/>
    <!-- Top edge decorative -->
    <path d="M155,510 C170,498 190,490 210,488 C230,486 250,494 265,505" stroke="#C8B898" stroke-width="1.5" fill="none" opacity="0.8"/>
  </g>

  <!-- ===== RIBBON ===== -->
  <!-- Ribbon body - horizontal band -->
  <g filter="url(#glow)" style="animation: ribbon-wave 4s ease-in-out infinite">
    <!-- Main ribbon band -->
    <path d="M140,505 C165,498 190,494 210,493 C230,492 255,496 280,505 C280,518 255,514 230,510 C215,508 205,507 190,509 C168,512 148,518 140,518Z" fill="url(#ribbonG)"/>
    <!-- Ribbon shimmer -->

    <!-- Ribbon shadow bottom -->
    <path d="M140,518 C165,515 192,512 210,512 C228,511 255,514 280,518" stroke="#A07818" stroke-width="1" fill="none" opacity="0.6"/>

    <!-- Bow left loop -->
    <path d="M165,506 C155,488 138,472 118,468 C108,466 100,470 103,480 C106,490 120,494 135,495 C150,496 162,500 165,506Z" fill="url(#ribbonGV)"/>
    <path d="M165,506 C152,490 132,476 115,472" stroke="rgba(255,240,150,0.5)" stroke-width="1" fill="none"/>
    <!-- Bow right loop -->

    <!-- Bow center knot -->

    <ellipse cx="210" cy="505" rx="12" ry="8" fill="#E8C030" opacity="0.8"/>
    <ellipse cx="207" cy="503" rx="6" ry="4" fill="rgba(255,248,180,0.6)"/>

    <path d="M200,512 C192,530 185,550 188,575 C190,585 196,590 200,600" stroke="url(#ribbonG)" stroke-width="7" fill="none" stroke-linecap="round"/>
    <path d="M220,512 C228,530 235,550 232,575 C230,585 224,590 220,600" stroke="url(#ribbonG)" stroke-width="7" fill="none" stroke-linecap="round"/>
    <!-- Tail ends -->
    <path d="M185,590 C182,600 192,605 200,600" stroke="#C8A020" stroke-width="2" fill="none"/>
    <path d="M235,590 C238,600 228,605 220,600" stroke="#C8A020" stroke-width="2" fill="none"/>
  </g>

  <!-- ===== FLOWERS ===== -->

  <!-- === HELPER FUNCTION — each rose is drawn as a group of concentric petals === -->

  <!-- ROSE 1 — Center, large, facing front -->
  <g class="rose-group" transform="translate(210, 200)" filter="url(#soft-shadow)" style="animation: sway 5.5s ease-in-out infinite; animation-delay: 0s;">
    <!-- Outer petals layer -->
    <ellipse cx="0" cy="8" rx="32" ry="24" fill="#8B1A2F" opacity="0.8" transform="rotate(-30)"/>
    <ellipse cx="0" cy="8" rx="32" ry="24" fill="#8B1A2F" opacity="0.8" transform="rotate(30)"/>
    <ellipse cx="0" cy="8" rx="32" ry="24" fill="#8B1A2F" opacity="0.8" transform="rotate(90)"/>
    <ellipse cx="0" cy="8" rx="32" ry="24" fill="#8B1A2F" opacity="0.8" transform="rotate(150)"/>

    <ellipse cx="0" cy="8" rx="32" ry="24" fill="#8B1A2F" opacity="0.8" transform="rotate(270)"/>

    <ellipse cx="0" cy="6" rx="25" ry="19" fill="url(#rg1)" transform="rotate(160)"/>
    <ellipse cx="0" cy="6" rx="25" ry="19" fill="url(#rg1)" transform="rotate(220)"/>
    <ellipse cx="0" cy="6" rx="25" ry="19" fill="url(#rg1)" transform="rotate(280)"/>
    <!-- Inner petals -->
    <ellipse cx="0" cy="5" rx="18" ry="13" fill="url(#rg2)" transform="rotate(-15)"/>
    <ellipse cx="0" cy="5" rx="18" ry="13" fill="url(#rg2)" transform="rotate(45)"/>
    <ellipse cx="0" cy="5" rx="18" ry="13" fill="url(#rg2)" transform="rotate(105)"/>
    <ellipse cx="0" cy="5" rx="18" ry="13" fill="url(#rg2)" transform="rotate(165)"/>
    <ellipse cx="0" cy="5" rx="18" ry="13" fill="url(#rg2)" transform="rotate(225)"/>
    <!-- Core spiral -->
    <ellipse cx="0" cy="3" rx="11" ry="8" fill="url(#rg3)" transform="rotate(10)"/>
    <ellipse cx="0" cy="3" rx="11" ry="8" fill="url(#rg3)" transform="rotate(70)"/>
    <ellipse cx="0" cy="3" rx="11" ry="8" fill="url(#rg3)" transform="rotate(130)"/>
    <ellipse cx="0" cy="3" rx="11" ry="8" fill="url(#rg3)" transform="rotate(190)"/>
    <!-- Center bud -->
    <ellipse cx="0" cy="0" rx="7" ry="5" fill="#FDD5DE"/>

    <!-- Highlight -->

  <!-- ROSE 2 — Left, slightly lower, angled -->
  <g class="rose-group" transform="translate(148,240)" filter="url(#soft-shadow)" style="animation: sway-alt 6s ease-in-out infinite; animation-delay: -1s;">
    <ellipse cx="0" cy="7" rx="28" ry="20" fill="#7A1228" opacity="0.85" transform="rotate(-25)"/>
    <ellipse cx="0" cy="7" rx="28" ry="20" fill="#7A1228" opacity="0.85" transform="rotate(35)"/>
    <ellipse cx="0" cy="7" rx="28" ry="20" fill="#7A1228" opacity="0.85" transform="rotate(95)"/>

    <ellipse cx="0" cy="7" rx="28" ry="20" fill="#7A1228" opacity="0.85" transform="rotate(215)"/>
    <ellipse cx="0" cy="7" rx="28" ry="20" fill="#7A1228" opacity="0.85" transform="rotate(275)"/>
    <ellipse cx="0" cy="5" rx="21" ry="15" fill="url(#rg4)" transform="rotate(-15)"/>
    <ellipse cx="0" cy="5" rx="21" ry="15" fill="url(#rg4)" transform="rotate(45)"/>
    <ellipse cx="0" cy="5" rx="21" ry="15" fill="url(#rg4)" transform="rotate(105)"/>
    <ellipse cx="0" cy="5" rx="21" ry="15" fill="url(#rg4)" transform="rotate(165)"/>
    <ellipse cx="0" cy="5" rx="21" ry="15" fill="url(#rg4)" transform="rotate(225)"/>
    <ellipse cx="0" cy="3" rx="13" ry="9" fill="url(#rg1)" transform="rotate(20)"/>

    <ellipse cx="0" cy="3" rx="13" ry="9" fill="url(#rg1)" transform="rotate(200)"/>
    <ellipse cx="0" cy="0" rx="7" ry="5" fill="#E8698A"/>
    <ellipse cx="-3" cy="-4" rx="4" ry="3" fill="rgba(255,255,255,0.2)" transform="rotate(-15)"/>
  </g>

  <!-- ROSE 3 — Right, mid height -->
  <g class="rose-group" transform="translate(272,230)" filter="url(#soft-shadow)" style="animation: sway 6.5s ease-in-out infinite; animation-delay: -2.5s;">
    <ellipse cx="0" cy="7" rx="28" ry="21" fill="#6A1020" opacity="0.85" transform="rotate(-20)"/>
    <ellipse cx="0" cy="7" rx="28" ry="21" fill="#6A1020" opacity="0.85" transform="rotate(40)"/>
    <ellipse cx="0" cy="7" rx="28" ry="21" fill="#6A1020" opacity="0.85" transform="rotate(100)"/>
    <ellipse cx="0" cy="7" rx="28" ry="21" fill="#6A1020" opacity="0.85" transform="rotate(160)"/>

<script>
// Generate ambient floating particles
const particlesEl = document.getElementById('particles');
for (let i = 0; i < 28; i++) {
  const p = document.createElement('div');
  p.className = 'particle';
  const size = 3 + Math.random() * 6;
  p.style.cssText = `
    width: ${size}px;
    height: ${size}px;
    left: ${20 + Math.random() * 60}%;
    animation-duration: ${8 + Math.random() * 14}s;
    animation-delay: ${Math.random() * 12}s;
  `;
  particlesEl.appendChild(p);
}

// Generate falling petals after bouquet appears
setTimeout(() => {
  for (let i = 0; i < 18; i++) {
    const petal = document.createElement('div');
    petal.className = 'falling-petal';
    const colors = ['#FDD5DE','#F4A7B9','#E8698A','#E8D8F4','#C9A8D4'];
    const color = colors[Math.floor(Math.random() * colors.length)];
    const startX = 120 + Math.random() * 180;
    const startY = 180 + Math.random() * 160;
    const dx = (Math.random() - 0.5) * 120;
    const rot = (Math.random() - 0.5) * 360;
    const dur = 3 + Math.random() * 4;
    const size = 8 + Math.random() * 12;
    petal.style.cssText = `
      left: calc(50% - 210px + ${startX}px);
      top: ${startY}px;
      width: ${size}px;
      height: ${size * 0.65}px;
      border-radius: 60% 0 60% 0;
      background: ${color};
      opacity: 0;
      --dx: ${dx}px;
      --rot: ${rot}deg;
      --dur: ${dur}s;
      --delay: ${1 + Math.random() * 8}s;
    `;
    document.body.appendChild(petal);
  }
}, 2500);
</script>
